<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Login | MERL Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<style>
.auth-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#eef3ff,#f4fbf7);
}

.auth-card{
  background:#fff;
  border-radius:22px;
  padding:40px;
  width:100%;
  max-width:420px;
  box-shadow:0 25px 60px rgba(0,0,0,.15);
  border:1px solid rgba(13,23,44,.10);
}

.auth-card h2{
  margin:0 0 8px;
  font-size:24px;
}

.auth-card p{
  font-size:14px;
  color:#60718a;
  margin-bottom:24px;
}

.auth-card label{
  font-size:13px;
  font-weight:700;
  display:block;
  margin-bottom:6px;
}

.auth-card input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:1px solid #dde6f2;
  padding:0 12px;
  margin-bottom:18px;
  background:#f7f9ff;
  font-weight:600;
}

.auth-card input:focus{
  outline:none;
  box-shadow:0 0 0 3px rgba(247,201,72,.35);
  border-color:#f7c948;
  background:#fff;
}

.auth-btn{
  width:100%;
  height:46px;
  border-radius:14px;
  border:none;
  font-weight:800;
  background:linear-gradient(180deg,#f7c948,#f5b000);
  cursor:pointer;
}

.auth-btn:hover{
  transform:translateY(-1px);
}

.small-note{
  margin-top:15px;
  font-size:12px;
  color:#8897ad;
  text-align:center;
}
</style>
</head>

<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Secure Access</h2>
    <p>Please login to access the MERL Dashboard</p>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" required placeholder="Enter your email">

      <label>Password</label>
      <input type="password" required placeholder="Enter your password">

      <button type="submit" class="auth-btn">
        Login
      </button>
    </form>

    <div class="small-note">
      Demo login – any credentials will work.
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const nextPage = params.get("next") || "index.html";

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  // Simulate authentication success
  setTimeout(()=>{
    window.location.href = nextPage;
  }, 500);
});
</script>

</body>
</html>
